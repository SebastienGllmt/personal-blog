# Cloudflare Workers config for personal-blog. Mirrors the engine's expected
# bindings (see presidocs/methodology.md → Deploy architecture). Per-blog
# values — worker name, R2 bucket — live here, NOT in the engine.
#
# Secrets are set via `wrangler secret put …` (same names as the engine docs):
#   SESSION_SECRET, GOOGLE_OAUTH_CLIENT_ID/SECRET,
#   MICROSOFT_OAUTH_CLIENT_ID/SECRET, OAUTH_REDIRECT_BASE

# Pinned so `wrangler deploy` skips account auto-discovery. Wrangler 4.x
# resolves the account via GET /client/v4/memberships, which the `wrangler
# login` OAuth token can't read (403) — leaving it unset fails with "Failed to
# automatically retrieve account IDs". Account IDs aren't secret (same value as
# in the dashboard URL); pinning it also makes deploys deterministic.
account_id = "fd3815f9fae3bcd1b28d91c7569b6b81"

name = "personal-blog"
main = "worker.ts"
compatibility_date = "2026-05-19"
compatibility_flags = ["nodejs_compat"]

# Serve the Worker under your own domain. PREREQUISITE: sebastiengllmt.com must
# be a zone on THIS Cloudflare account (dashboard → Add a site → point the
# registrar's nameservers at Cloudflare and wait for "Active"). With
# `custom_domain = true`, `wrangler deploy` auto-creates the DNS record + a
# managed TLS cert and routes the hostname to this Worker.
# For the apex instead of a subdomain, use pattern = "sebastiengllmt.com".
[[routes]]
pattern = "blog.sebastiengllmt.com"
custom_domain = true

[vars]
NODE_ENV = "production"

# Built artifact directory from `bun run build`.
# `run_worker_first = true` is load-bearing for security: without it, Cloudflare
# serves matching static assets DIRECTLY and never invokes the Worker, so the
# document CSP + security headers applied in createWorker.ts (via withSecurityHeaders
# wrapping the ASSETS.fetch fall-through) would be missing on the HTML/JS/CSS.
# With it, every request runs the Worker, which fetches the asset and wraps it.
[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true

# Private R2 bucket holding per-(post,user) Automerge comment blobs.
# Create out-of-band:  wrangler r2 bucket create personal-blog-comments
[[r2_buckets]]
binding = "COMMENTS"
bucket_name = "personal-blog-comments"

# Workers Rate Limiting API bindings. First-class `[[ratelimits]]` block
# (replaces the legacy `[[unsafe.bindings]] type = "ratelimit"` form — see
# Workers docs → "Rate Limiting"; requires Wrangler ≥ 4.36.0).
#
# - RATE_LIMITER: comments writes, keyed by userId in the engine. Tight
#   because a single user shouldn't be writing 10+ change-objects per minute.
# - ANALYTICS_RATE_LIMITER: engagement-analytics beacon (/_a), keyed on
#   edge IP. Roomier ceiling because every page load may emit page_view +
#   up to 5 narration events; 100/60s is well above any real session and
#   well below a flood. Separate namespace_id so a misbehaving anonymous
#   beacon source can't burn the authenticated comment-write budget.
[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "2001"
simple = { limit = 10, period = 60 }

[[ratelimits]]
name = "ANALYTICS_RATE_LIMITER"
namespace_id = "2002"
simple = { limit = 100, period = 60 }

# Cloudflare Analytics Engine dataset for engagement analytics — anonymous,
# cookieless events written by the Worker (`server/analyticsRoute.ts`).
# Queried via Cloudflare's GraphQL/SQL surface. See methodology.md →
# "Engagement analytics".
#

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "blog_engagement"
